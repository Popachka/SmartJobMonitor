{% extends "base.html" %}

{% block content %}
<form class="form-grid">
  <label class="field">
    <span class="field-label">Режим</span>
    <select name="salary_mode">
      <option value="ANY" {% if salary_mode == 'ANY' %}selected{% endif %}>Любая зарплата</option>
      <option value="FROM" {% if salary_mode == 'FROM' %}selected{% endif %}>От суммы</option>
    </select>
  </label>

  <label class="field">
    <span class="field-label">Сумма в рублях</span>
    <input
      type="number"
      name="salary_amount_rub"
      inputmode="numeric"
      min="0"
      placeholder="Например, 250000"
      value="{{ salary_amount }}"
    />
  </label>

  <button class="primary-button" type="button" data-placeholder-action>
    {{ action_label }}
  </button>
</form>
{% endblock %}
