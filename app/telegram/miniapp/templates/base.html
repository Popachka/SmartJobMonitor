<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }} | JobMonitor</title>
    <link rel="stylesheet" href="{{ request.url_for('miniapp-static', path='css/app.css') }}" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body data-page="{{ active_page }}">
    <main class="page-shell">
      <header class="page-header">
        <h1>{{ page_title }}</h1>
        <p class="page-description">{{ page_description }}</p>
      </header>

      {% block content %}{% endblock %}
    </main>

    <script src="{{ request.url_for('miniapp-static', path='js/app.js') }}"></script>
  </body>
</html>
